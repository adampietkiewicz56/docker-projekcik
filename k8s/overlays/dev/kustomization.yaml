apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: notes-dev

resources:
  - ../../base

labels:
  - includeSelectors: false
    pairs:
      environment: dev

images:
  - name: ghcr.io/REPLACE_OWNER/notes-backend
    newName: notes-backend
    newTag: dev
  - name: ghcr.io/REPLACE_OWNER/notes-worker
    newName: notes-worker
    newTag: dev
  - name: ghcr.io/REPLACE_OWNER/notes-frontend
    newName: notes-frontend
    newTag: dev

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Ingress
      name: notes
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: notes.dev.local
