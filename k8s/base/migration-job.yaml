apiVersion: batch/v1
kind: Job
metadata:
  name: notes-migrate
  annotations:
    description: "Inicjalizuje schemat bazy. Czeka aż Postgres będzie gotowy, następnie uruchamia create_all przez SQLAlchemy."
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notes-migrate
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER"; do
                echo "waiting for postgres..."; sleep 2;
              done
          envFrom:
            - configMapRef:
                name: notes-config
            - secretRef:
                name: notes-secret
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: migrate
          image: ghcr.io/REPLACE_OWNER/notes-backend:latest
          command:
            - python
            - -c
            - |
              from app.database import engine
              from app.models import Base
              Base.metadata.create_all(bind=engine)
              print("schema ensured")
          envFrom:
            - configMapRef:
                name: notes-config
            - secretRef:
                name: notes-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
