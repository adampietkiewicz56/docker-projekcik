apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: notes

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: notes-platform

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-statefulset.yaml
  - redis.yaml
  - migration-job.yaml
  - backend.yaml
  - worker.yaml
  - frontend.yaml
  - ingress.yaml
  - networkpolicy.yaml
  - pdb.yaml
