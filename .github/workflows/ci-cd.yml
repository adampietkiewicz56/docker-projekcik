name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/notes-backend
  IMAGE_WORKER: ${{ github.repository_owner }}/notes-worker
  IMAGE_FRONTEND: ${{ github.repository_owner }}/notes-frontend

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        working-directory: backend
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
        run: pytest -q

  build-and-push:
    name: Build & push images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/notes-backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/notes-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/notes-worker:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/notes-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/notes-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/notes-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-kind:
    name: Deploy to kind & verify rollout
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.24.0
          cluster_name: notes-ci
          config: .github/kind-ci-config.yaml

      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s

      - name: Patch image references with owner
        run: |
          OWNER=${{ steps.owner.outputs.owner }}
          TAG=${{ needs.build-and-push.outputs.tag }}
          find k8s -name '*.yaml' -exec sed -i "s|ghcr.io/REPLACE_OWNER|ghcr.io/${OWNER}|g" {} +
          find k8s -name '*.yaml' -exec sed -i "s|:latest|:${TAG}|g" {} +

      - name: Login to GHCR (image pull secret)
        run: |
          kubectl create namespace notes-dev || true
          kubectl -n notes-dev create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n notes-dev patch serviceaccount default \
            -p '{"imagePullSecrets":[{"name":"ghcr-pull"}]}' || true

      - name: Apply overlay dev
        run: |
          kubectl apply -k k8s/overlays/dev

      - name: Wait for rollout
        run: |
          set -e
          kubectl -n notes-dev rollout status statefulset/dev-postgres --timeout=180s
          kubectl -n notes-dev rollout status deployment/dev-redis      --timeout=180s
          kubectl -n notes-dev wait --for=condition=complete job/dev-notes-migrate --timeout=180s || \
            kubectl -n notes-dev logs job/dev-notes-migrate --all-containers || true
          kubectl -n notes-dev rollout status deployment/dev-backend  --timeout=180s
          kubectl -n notes-dev rollout status deployment/dev-worker   --timeout=180s
          kubectl -n notes-dev rollout status deployment/dev-frontend --timeout=180s

      - name: Smoke test API
        run: |
          kubectl -n notes-dev port-forward svc/dev-backend 8000:8000 &
          PF=$!
          sleep 5
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/ready
          curl -fsS -X POST http://localhost:8000/notes \
            -H 'Content-Type: application/json' \
            -d '{"title":"ci","content":"deployed from github actions"}'
          curl -fsS http://localhost:8000/notes
          curl -fsS http://localhost:8000/metrics | head -n 5
          kill $PF || true

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl -n notes-dev get all
          kubectl -n notes-dev describe pods
          kubectl -n notes-dev logs -l app.kubernetes.io/name=backend --all-containers --tail=200 || true
          kubectl -n notes-dev logs -l app.kubernetes.io/name=worker  --all-containers --tail=200 || true
